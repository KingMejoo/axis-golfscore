<div id="app"></div>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f3f4f6}
#app{max-width:540px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
.cd{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:center;padding:8px 4px;color:#6b7280;border-bottom:2px solid #e5e7eb}
th:first-child{text-align:left}
td{padding:8px 4px;text-align:center;border-bottom:1px solid #f3f4f6}
td:first-child{text-align:left;font-weight:700}
.pb{border:1px solid #d1d5db;border-radius:20px;padding:6px 14px;font-size:13px;cursor:pointer;background:#fff;color:#374151;font-weight:500;display:inline-block;margin:0 3px 6px 0}
.pb.on{background:#166534;color:#fff;border-color:#166534;font-weight:700}
.st{display:flex;overflow-x:auto;border-bottom:1px solid #e5e7eb;margin-bottom:12px}
.st button{flex:none;padding:8px 14px;border:none;background:none;font-size:13px;cursor:pointer;white-space:nowrap;color:#6b7280;border-bottom:2px solid transparent}
.st button.on{color:#16a34a;font-weight:700;border-bottom-color:#16a34a}
</style>
<script>
var RE = {"1":"🥇","2":"🥈","3":"🥉","4":"4위"};

var matches = [
  {id:1,date:"2025-03-01",rankings:[{name:"김정민",rank:1},{name:"이영희",rank:2},{name:"박민수",rank:3},{name:"최지호",rank:4}]},
  {id:2,date:"2025-03-15",rankings:[{name:"이영희",rank:1},{name:"김정민",rank:2},{name:"최지호",rank:3},{name:"박민수",rank:4}]},
  {id:3,date:"2025-04-05",rankings:[{name:"김정민",rank:1},{name:"최지호",rank:2},{name:"이영희",rank:3},{name:"박민수",rank:4}]},
  {id:4,date:"2025-04-20",rankings:[{name:"박민수",rank:1},{name:"김정민",rank:2},{name:"이영희",rank:3},{name:"최지호",rank:4}]},
  {id:5,date:"2025-05-10",rankings:[{name:"김정민",rank:1},{name:"이영희",rank:2},{name:"박민수",rank:3},{name:"최지호",rank:4}]},
  {id:6,date:"2026-01-11",rankings:[{name:"최지호",rank:1},{name:"김정민",rank:2},{name:"박민수",rank:3},{name:"이영희",rank:4}]},
  {id:7,date:"2026-02-08",rankings:[{name:"김정민",rank:1},{name:"박민수",rank:2},{name:"이영희",rank:3},{name:"최지호",rank:4}]},
  {id:8,date:"2026-03-15",rankings:[{name:"이영희",rank:1},{name:"김정민",rank:2},{name:"최지호",rank:3},{name:"박민수",rank:4}]}
];

var selPlayer = "김정민";
var selYear = 0;

function getPlayers() {
  var set = {};
  matches.forEach(function(m) { m.rankings.forEach(function(r) { set[r.name] = true; }); });
  return Object.keys(set).sort();
}

function getStats() {
  var players = getPlayers();
  var s = {};
  players.forEach(function(p) { s[p] = {games:0,r1:0,r2:0,r3:0,r4:0,wins:0,losses:0,draws:0,tr:0}; });
  matches.forEach(function(m) {
    m.rankings.forEach(function(r) {
      if (!s[r.name]) return;
      s[r.name].games++;
      s[r.name].tr += r.rank;
      if (r.rank >= 1 && r.rank <= 4) s[r.name]["r" + r.rank]++;
    });
    for (var i = 0; i < m.rankings.length; i++) {
      for (var j = i + 1; j < m.rankings.length; j++) {
        var a = m.rankings[i], b = m.rankings[j];
        if (!s[a.name] || !s[b.name]) continue;
        if (a.rank < b.rank) { s[a.name].wins++; s[b.name].losses++; }
        else if (a.rank > b.rank) { s[b.name].wins++; s[a.name].losses++; }
        else { s[a.name].draws++; s[b.name].draws++; }
      }
    }
  });
  return s;
}

function getH2H(player, filteredMatches) {
  var h = {};
  filteredMatches.forEach(function(m) {
    var me = null;
    for (var k = 0; k < m.rankings.length; k++) {
      if (m.rankings[k].name === player) { me = m.rankings[k]; break; }
    }
    if (!me) return;
    m.rankings.forEach(function(r) {
      if (r.name === player) return;
      if (!h[r.name]) h[r.name] = {opp: r.name, w: 0, l: 0, d: 0};
      if (me.rank < r.rank) h[r.name].w++;
      else if (me.rank > r.rank) h[r.name].l++;
      else h[r.name].d++;
    });
  });
  var arr = [];
  for (var key in h) arr.push(h[key]);
  arr.sort(function(a, b) { return (b.w / (b.w + b.l + b.d || 1)) - (a.w / (a.w + a.l + a.d || 1)); });
  return arr;
}

function winRate(w, l, d) {
  var t = w + l + (d || 0);
  if (!t) return '<span style="color:#9ca3af">-</span>';
  var r = ((w / t) * 100).toFixed(0);
  return '<span style="font-weight:700;color:' + (r >= 50 ? '#16a34a' : '#ef4444') + '">' + r + '%</span>';
}

function esc(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function selectPlayer(name) {
  selPlayer = (selPlayer === name) ? null : name;
  render();
}

function selectYear(idx) {
  selYear = idx;
  render();
}

function render() {
  var players = getPlayers();
  var stats = getStats();
  var sorted = players.slice().sort(function(a, b) {
    var ra = stats[a].games ? stats[a].tr / stats[a].games : 99;
    var rb = stats[b].games ? stats[b].tr / stats[b].games : 99;
    return ra - rb;
  });

  var years = {};
  matches.forEach(function(m) { if (m.date) years[m.date.slice(0, 4)] = true; });
  var yearList = Object.keys(years).sort(function(a, b) { return b.localeCompare(a); });
  yearList.push("총 전적");
  if (selYear >= yearList.length) selYear = yearList.length - 1;
  var curYear = yearList[selYear];

  var filtered = curYear === "총 전적" ? matches : matches.filter(function(m) { return m.date && m.date.slice(0, 4) === curYear; });
  var h2d = selPlayer ? getH2H(selPlayer, filtered) : [];

  var h = "";

  // 헤더
  h += '<div style="background:linear-gradient(135deg,#166534,#16a34a);padding:24px 16px 16px;color:#fff">';
  h += '<h1 style="font-size:22px;font-weight:800">⛳ 골프 스코어 관리</h1>';
  h += '<p style="font-size:13px;opacity:.85;margin-top:4px">경기 ' + matches.length + '개 · 플레이어 ' + players.length + '명 (샘플 데이터)</p></div>';

  // 개인 통계
  h += '<div style="padding:16px">';
  h += '<h2 style="font-size:16px;font-weight:700;margin-bottom:16px">개인 통계</h2>';
  h += '<div class="cd"><div style="overflow-x:auto"><table><thead><tr>';
  h += '<th style="text-align:left">이름</th><th>경기</th><th style="color:#eab308">🥇</th><th style="color:#94a3b8">🥈</th><th style="color:#c2703e">🥉</th>';
  h += '<th style="color:#16a34a;font-weight:600">승</th><th style="color:#ef4444;font-weight:600">패</th><th style="font-weight:600">승률</th>';
  h += '</tr></thead><tbody>';
  sorted.forEach(function(p, idx) {
    var st = stats[p];
    h += '<tr style="background:' + (idx === 0 ? '#fefce8' : 'transparent') + '">';
    h += '<td>' + esc(p) + '</td><td>' + st.games + '</td>';
    h += '<td style="font-weight:600">' + (st.r1 || "-") + '</td><td>' + (st.r2 || "-") + '</td><td>' + (st.r3 || "-") + '</td>';
    h += '<td style="color:#16a34a;font-weight:600">' + st.wins + '</td>';
    h += '<td style="color:#ef4444;font-weight:600">' + st.losses + '</td>';
    h += '<td>' + winRate(st.wins, st.losses, st.draws) + '</td></tr>';
  });
  h += '</tbody></table></div></div>';

  // 1:1 전적
  h += '<h2 style="font-size:16px;font-weight:700;margin:20px 0 12px">1:1 전적</h2>';
  h += '<div style="margin-bottom:16px">';
  sorted.forEach(function(p) {
    h += '<button class="pb' + (selPlayer === p ? ' on' : '') + '" onclick="selectPlayer(\'' + esc(p) + '\')">' + esc(p) + '</button>';
  });
  h += '</div>';

  if (!selPlayer) {
    h += '<div class="cd" style="text-align:center;color:#9ca3af;padding:30px">플레이어를 선택하면 해당 플레이어의<br>1:1 전적을 확인할 수 있습니다</div>';
  } else {
    // 연도 탭
    h += '<div class="st">';
    yearList.forEach(function(t, i) {
      h += '<button class="' + (selYear === i ? 'on' : '') + '" onclick="selectYear(' + i + ')">' + t + '</button>';
    });
    h += '</div>';

    if (!h2d.length) {
      h += '<div class="cd" style="text-align:center;color:#9ca3af;padding:30px">' + esc(selPlayer) + '의 ' + (curYear === "총 전적" ? "" : curYear + "년 ") + '전적이 없습니다</div>';
    } else {
      // 요약 카드
      var tw = 0, tl = 0, td2 = 0;
      h2d.forEach(function(x) { tw += x.w; tl += x.l; td2 += x.d; });
      var ttot = tw + tl + td2;
      var trate = ttot ? ((tw / ttot) * 100).toFixed(0) : 0;

      h += '<div class="cd" style="text-align:center;padding:20px;margin-bottom:16px;background:linear-gradient(135deg,#f0fdf4,#fefce8)">';
      h += '<div style="font-size:18px;font-weight:800;color:#166534;margin-bottom:8px">' + esc(selPlayer) + '</div>';
      h += '<div style="display:flex;justify-content:center;gap:20px;margin-bottom:8px">';
      h += '<div><div style="font-size:24px;font-weight:800;color:#16a34a">' + tw + '</div><div style="font-size:11px;color:#6b7280">승</div></div>';
      h += '<div><div style="font-size:24px;font-weight:800;color:#ef4444">' + tl + '</div><div style="font-size:11px;color:#6b7280">패</div></div>';
      if (td2) { h += '<div><div style="font-size:24px;font-weight:800;color:#6b7280">' + td2 + '</div><div style="font-size:11px;color:#6b7280">무</div></div>'; }
      h += '</div>';
      h += '<div style="font-size:13px;color:#6b7280">' + (curYear === "총 전적" ? "총" : curYear + "년") + ' 승률 ';
      h += '<span style="font-weight:700;font-size:16px;color:' + (trate >= 50 ? '#16a34a' : '#ef4444') + '">' + trate + '%</span></div></div>';

      // 상대별 전적
      h2d.forEach(function(x) {
        var tot = x.w + x.l + x.d;
        var myR = tot ? ((x.w / tot) * 100).toFixed(0) : 0;
        var opR = tot ? ((x.l / tot) * 100).toFixed(0) : 0;

        h += '<div class="cd" style="padding:14px">';
        h += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
        // 왼쪽
        h += '<div style="text-align:center;flex:1">';
        h += '<div style="font-weight:700;font-size:15px;color:' + (x.w > x.l ? '#16a34a' : (x.w < x.l ? '#9ca3af' : '#374151')) + '">' + esc(selPlayer) + '</div>';
        h += '<div style="font-size:24px;font-weight:800;color:' + (x.w > x.l ? '#16a34a' : '#374151') + '">' + x.w + '</div></div>';
        // 가운데
        h += '<div style="text-align:center;padding:0 8px"><div style="font-size:12px;color:#6b7280;font-weight:600">VS</div>';
        if (x.d) h += '<div style="font-size:11px;color:#9ca3af">무 ' + x.d + '</div>';
        h += '</div>';
        // 오른쪽
        h += '<div style="text-align:center;flex:1">';
        h += '<div style="font-weight:700;font-size:15px;color:' + (x.l > x.w ? '#16a34a' : (x.l < x.w ? '#9ca3af' : '#374151')) + '">' + esc(x.opp) + '</div>';
        h += '<div style="font-size:24px;font-weight:800;color:' + (x.l > x.w ? '#16a34a' : '#374151') + '">' + x.l + '</div></div>';
        h += '</div>';
        // 승률 바
        h += '<div style="display:flex;align-items:center;gap:6px;font-size:11px">';
        h += '<span style="color:' + (myR >= opR ? '#16a34a' : '#9ca3af') + ';font-weight:600;width:36px;text-align:right">' + myR + '%</span>';
        h += '<div style="flex:1;height:6px;border-radius:3px;background:#e5e7eb;overflow:hidden;display:flex">';
        h += '<div style="width:' + myR + '%;background:#16a34a;border-radius:3px 0 0 3px"></div>';
        h += '<div style="width:' + opR + '%;background:#3b82f6;border-radius:0 3px 3px 0;margin-left:auto"></div></div>';
        h += '<span style="color:' + (opR >= myR ? '#3b82f6' : '#9ca3af') + ';font-weight:600;width:36px">' + opR + '%</span></div>';
        h += '<div style="text-align:center;font-size:11px;color:#9ca3af;margin-top:4px">총 ' + tot + '경기</div></div>';
      });
    }
  }

  h += '</div>';
  document.getElementById("app").innerHTML = h;
}

render();
</script>
